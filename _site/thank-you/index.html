<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks! — The Claw Drop</title>
    <meta name="description" content="Thanks for submitting your OpenClaw build.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪝</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --border: #1e1e2e;
            --text: #e8e6f0;
            --text-muted: #8888a0;
            --text-dim: #555568;
            --accent: #6c5ce7;
            --accent-bright: #a29bfe;
            --green: #00cec9;
            --pink: #fd79a8;
            --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -100px; animation: float1 20s ease-in-out infinite; }
        .orb-2 { width: 500px; height: 500px; background: var(--pink); bottom: -150px; right: -100px; animation: float2 25s ease-in-out infinite; }

        @keyframes float1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(80px, 60px); } }
        @keyframes float2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-60px, -80px); } }

        .container { position: relative; z-index: 2; max-width: 720px; margin: 0 auto; padding: 0 24px; display: flex; flex-direction: column; min-height: 100vh; }

        nav { padding: 24px 0; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-icon { font-size: 1.4rem; }
        .logo span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nav-link { font-size: 0.85rem; color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .nav-link:hover { color: var(--accent-bright); }

        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 0; }

        .hero-emoji { font-size: 4rem; margin-bottom: 32px; display: inline-block; animation: pop 0.6s ease-out; }
        @keyframes pop { 0% { transform: scale(0) rotate(-20deg); opacity: 0; } 60% { transform: scale(1.15) rotate(5deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }

        h1 { font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 900; line-height: 1.1; letter-spacing: -0.04em; margin-bottom: 20px; }
        h1 .highlight { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .message { font-size: 1.05rem; color: var(--text-muted); line-height: 1.7; max-width: 480px; margin: 0 auto 40px; }
        .message strong { color: var(--text); font-weight: 600; }

        .cta-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        .cta-btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: all 0.3s ease; }
        .cta-primary { background: var(--accent); color: white; }
        .cta-primary:hover { background: var(--accent-bright); transform: translateY(-2px); }
        .cta-secondary { border: 1px solid var(--border); color: var(--text-muted); background: var(--bg-card); }
        .cta-secondary:hover { border-color: var(--accent); color: var(--accent-bright); transform: translateY(-2px); }

        footer { text-align: center; padding: 40px 0 60px; border-top: 1px solid var(--border); }
        footer p { font-size: 0.78rem; color: var(--text-dim); }
        footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: var(--accent-bright); }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <nav>
            <a href="/" class="logo">
                <span class="logo-icon">🪝</span>
                <span>the claw drop</span>
            </a>
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="/showcase" class="nav-link">Archive</a>
                <a href="/submit" class="nav-link">Submit</a>
            </div>
        </nav>

        <section class="content">
            <div class="hero-emoji">🪝</div>
            <h1>You're <span class="highlight">in</span></h1>
            <p class="message">
                <strong>First drop hits your inbox Tuesday.</strong> In the meantime — got a build worth sharing? Submit it and we might feature it in a future issue.
            </p>
            <div class="cta-row" style="flex-direction: column; align-items: center; gap: 16px;">
                <a href="/submit" class="cta-btn cta-primary">🔧 Submit a Use Case</a>
                <a href="/showcase" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--accent-bright)'" onmouseout="this.style.color='var(--text-muted)'">or browse the archive →</a>
            </div>
        </section>

        <footer>
            <p>
                Built with <a href="https://github.com/openclaw/openclaw" target="_blank">OpenClaw</a> ·
                A <a href="https://fundedlist.com" target="_blank">FundedList</a> project
            </p>
        </footer>
    </div>
</body>
</html>
