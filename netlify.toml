[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

[[redirects]]
  from = "/showcase/issues/001"
  to = "/archives/001/"
  status = 301

[[redirects]]
  from = "/showcase/issues/001/"
  to = "/archives/001/"
  status = 301

[[redirects]]
  from = "/showcase"
  to = "/archives/"
  status = 301

[[redirects]]
  from = "/showcase/"
  to = "/archives/"
  status = 301

[[redirects]]
  from = "/showcase/*"
  to = "/archives/"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"
