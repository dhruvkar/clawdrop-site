[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

# Legacy /blueprints/ → /playbooks/ (renamed Apr 2026)
[[redirects]]
  from = "/blueprints"
  to = "/playbooks/"
  status = 301

[[redirects]]
  from = "/blueprints/"
  to = "/playbooks/"
  status = 301

[[redirects]]
  from = "/blueprints/*"
  to = "/playbooks/:splat"
  status = 301

# Legacy /showcase/ → /archives/
[[redirects]]
  from = "/showcase/issues/001"
  to = "/archives/001/"
  status = 301

[[redirects]]
  from = "/showcase/issues/001/"
  to = "/archives/001/"
  status = 301

[[redirects]]
  from = "/showcase"
  to = "/archives/"
  status = 301

[[redirects]]
  from = "/showcase/"
  to = "/archives/"
  status = 301

[[redirects]]
  from = "/showcase/*"
  to = "/archives/"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Unpublished: SEC Form 144 deep-dive folded into the signal-based-leads playbook
[[redirects]]
  from = "/playbooks/newly-liquid-lead-finder"
  to = "/playbooks/signal-based-daily-leads/"
  status = 301

[[redirects]]
  from = "/playbooks/newly-liquid-lead-finder/"
  to = "/playbooks/signal-based-daily-leads/"
  status = 301

# Affiliate redirects
[[redirects]]
  from = "/go/inboxkit"
  to = "https://www.inboxkit.com/?aff=kzfCVuvZDa8H"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"
