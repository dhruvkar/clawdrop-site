backend:
  name: git-gateway
  branch: master

publish_mode: editorial_workflow
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "blueprints"
    label: "Blueprints"
    folder: "blueprints/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "blueprint.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Difficulty", name: "difficulty", widget: "select", options: ["Beginner", "Intermediate", "Advanced"] }
      - { label: "Cost", name: "cost", widget: "string" }
      - { label: "Time to Setup", name: "timeToSetup", widget: "string" }
      - { label: "Original Source URL", name: "originalSource", widget: "string" }
      - { label: "Original Author", name: "originalAuthor", widget: "string" }
      - { label: "Issue Number", name: "issueNumber", widget: "number", value_type: "int", required: false }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Tags", name: "tags", widget: "list", allow_add: true, field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "archives"
    label: "Newsletter Archives"
    folder: "archives/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "archive.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Subject Line", name: "subject", widget: "text" }
      - { label: "Issue Number", name: "issueNumber", widget: "number", value_type: "int" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
